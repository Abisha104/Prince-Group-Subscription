    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #fafef9;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* animated noise + gradient background (premium) */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse at 20% 40%, rgba(200, 250, 220, 0.4), rgba(235, 255, 240, 0.9)),
                  repeating-linear-gradient(45deg, rgba(25, 195, 125, 0.02) 0px, rgba(25, 195, 125, 0.02) 1px, transparent 1px, transparent 12px);
    }

    /* modern floating abstract shapes */
    .shape {
      position: fixed;
      filter: blur(70px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.5;
      animation: floatShape 20s infinite alternate ease-in-out;
    }
    .shape-1 { width: 50vw; height: 50vw; background: #b2f5cf; top: -20vh; left: -15vw; animation-duration: 25s; }
    .shape-2 { width: 40vw; height: 40vw; background: #a7f0d0; bottom: -15vh; right: -10vw; animation-duration: 22s; opacity: 0.4; }
    .shape-3 { width: 30vw; height: 30vw; background: #d4fce3; top: 40%; left: 70%; animation-duration: 18s; opacity: 0.45; }
    @keyframes floatShape {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 8%) scale(1.2); }
    }

    /* language switcher - refined */
    .lang-switcher-fixed {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 1050;
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 6px 8px;
      border-radius: 80px;
      box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(25, 195, 125, 0.3);
      border: 0.5px solid rgba(255,255,255,0.6);
    }
    .lang-btn {
      background: transparent;
      border: none;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 18px;
      border-radius: 60px;
      cursor: pointer;
      color: #1e2f2a;
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      letter-spacing: -0.2px;
    }
    .lang-btn.active {
      background: #19c37d;
      color: white;
      box-shadow: 0 6px 14px rgba(25, 195, 125, 0.3);
    }
    .lang-btn:not(.active):hover {
      background: rgba(25, 195, 125, 0.15);
      transform: translateY(-2px);
    }

    /* main container */
    .section {
      position: relative;
      z-index: 5;
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 28px 90px;
      text-align: center;
    }

    /* headers with modern gradient */
    .section h1 {

      font-weight: 800;
      background: linear-gradient(125deg, #0a2e22, #19c37d, #0f9f64);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      animation: fadeUp 0.7s ease;
    }

    .sub {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #3c5a4e;
      font-weight: 500;
      margin-bottom: 56px;
      position: relative;
      display: inline-block;
      background: rgba(25, 195, 125, 0.1);
      padding: 6px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* responsive grid — perfect for all devices */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 28px;
      margin-top: 18px;
    }

    /* modern card - premium glass+ smooth shadow */
    .card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      border-radius: 40px;
      padding: 28px 28px 26px 28px;
      text-align: left;

      border: 1px solid rgba(25, 195, 125, 0.25);
      box-shadow: 0 18px 35px -14px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(35px);
      position: relative;
      cursor: pointer;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-12px) scale(1.01);
      background: rgba(255, 255, 255, 0.94);
      border-color: #19c37d;
      box-shadow: 0 28px 44px -18px rgba(25, 195, 125, 0.35);

      opacity: 1;
      transform: scale(1.03);
      fill: #19c37d;
    }

    .testimonial-text {

      color: #1f2e28;

      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }
    .tags span {
      background: #e4f5ec;
      color: #0a5c42;
      font-size: 0.7rem;

    }
    .card:hover .tags span {
      background: #c8f0dd;
      transform: translateY(-2px);
    }

      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      border-top: 1px solid rgba(25, 195, 125, 0.2);

    }

    /* full responsiveness: phones, tables, large screens */

        right: 16px;

      }
      .lang-btn {
        padding: 6px 14px;
        font-size: 0.75rem;

    @media (max-width: 480px) {

      }
      .avatar-modern {
        width: 42px;
        height: 42px;

    /* smooth scrollbar */

      width: 6px;
    }

      background: #e4f5ec;
    }
    ::-webkit-scrollbar-thumb {
      background: #19c37d;
      border-radius: 6px;
    }

    .card {
      transition-delay: 0s;
    }
  </style>
</head>

  const translations = {
    en: { title: "Trusted Voices", sub: "15+ real stories from our community" },
    ta: { title: "நம்பகமான குரல்கள்", sub: "எங்கள் சமூகத்தின் 15+ உண்மை அனுபவங்கள்" }
  };

  let currentLang = "en";

  // helper stars
  function renderStars(rating = 5) {
    let stars = '';
    for (let i = 0; i < 5; i++) {
      stars += '<span class="star">★</span>';
    }
    return `<div class="rating">${stars}</div>`;
  }

  // render all cards with beautiful quote icon (no double quote misplaced)
  function render() {
    const gridEl = document.getElementById("grid");
    if (!gridEl) return;
    gridEl.innerHTML = "";
    const items = testimonialsData[currentLang];
    const fragment = document.createDocumentFragment();

    items.forEach((item, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.transitionDelay = `${Math.min(idx * 0.03, 0.45)}s`;

      const initial = item.name.charAt(0).toUpperCase();

      card.innerHTML = `
        <div class="quote-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.25 8.5C9.25 9.88 8.38 10.75 7 10.75C5.62 10.75 4.75 9.88 4.75 8.5C4.75 7.12 5.62 6.25 7 6.25C8.38 6.25 9.25 7.12 9.25 8.5Z" fill="#19c37d" stroke="#19c37d" stroke-width="0.8"/>
            <path d="M16.75 8.5C16.75 9.88 15.88 10.75 14.5 10.75C13.12 10.75 12.25 9.88 12.25 8.5C12.25 7.12 13.12 6.25 14.5 6.25C15.88 6.25 16.75 7.12 16.75 8.5Z" fill="#19c37d" stroke="#19c37d" stroke-width="0.8"/>
            <path d="M20 12.5C20 16.5 16.5 19.5 12.5 19.5C8.5 19.5 5 16.5 5 12.5" stroke="#19c37d" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <circle cx="12" cy="12" r="9" stroke="#19c37d" stroke-width="1.2" fill="none" stroke-dasharray="2 2"/>
          </svg>
        </div>
        <p class="testimonial-text">${item.text}</p>
        ${renderStars(item.rating)}
        <div class="tags">
          ${item.tags.map(tag => `<span>${tag}</span>`).join('')}
        </div>
        <div class="client-row">
          <div class="client-details">
            <h4>${item.name}</h4>
            <div class="client-location">📍 ${item.branch}</div>
          </div>
          <div class="avatar-modern">
            ${initial}
          </div>
        </div>
      `;
      fragment.appendChild(card);
    });

    gridEl.appendChild(fragment);

    // subtle staggered reveal
    setTimeout(() => {
      const cards = document.querySelectorAll(".card");
      cards.forEach(card => card.classList.add("show"));
    }, 50);
  }

  // language switch
  function switchLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("selectedLanguage", lang);

    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("sub").innerText = translations[lang].sub;

    const btnTa = document.getElementById("btnTa");
    const btnEn = document.getElementById("btnEn");
    if (btnTa && btnEn) {
      btnTa.classList.toggle("active", lang === "ta");
      btnEn.classList.toggle("active", lang === "en");
    }
    render();
  }

  // initialization
  document.addEventListener("DOMContentLoaded", () => {
    const saved = localStorage.getItem("selectedLanguage");
    if (saved === "ta" || saved === "en") currentLang = saved;
    else currentLang = "en";

    const btnTa = document.getElementById("btnTa");
    const btnEn = document.getElementById("btnEn");
    if (btnTa && btnEn) {
      btnTa.classList.toggle("active", currentLang === "ta");
      btnEn.classList.toggle("active", currentLang === "en");
    }
    document.getElementById("title").innerText = translations[currentLang].title;
    document.getElementById("sub").innerText = translations[currentLang].sub;
    render();
  });

  window.switchLanguage = switchLanguage;
</script>
</body>
</html>
