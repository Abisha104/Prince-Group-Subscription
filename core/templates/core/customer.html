<!DOCTYPE html>

<title>Customer Testimonials | Prince Group</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
  min-height: 100vh;
  position: relative;
}

/* Language Switcher - FIXED STICKY TOP */
.lang-switcher-fixed {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  display: flex;
  gap: 10px;
  background: rgba(0, 0, 0, 0.75);
  padding: 8px 16px;
  border-radius: 50px;
  backdrop-filter: blur(14px);
  border: 1px solid rgba(34, 197, 94, 0.4);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
}

.lang-btn-custom {
  background: none;
  border: none;
  color: #22c55e;
  font-weight: 600;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 30px;
  transition: all 0.2s;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
}

.lang-btn-custom:hover {
  background: rgba(34, 197, 94, 0.25);
  transform: scale(1.02);
}

.lang-sep {
  color: #ffffffaa;
}

.testimonials {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

.testimonials h1 {
  font-size: 32px;
  color: #0f172a;
}

.sub {
  color: #64748b;
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
}

/* CARD */
.card {
  background: #fff;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
  text-align: left;
  transition: 0.4s;
  opacity: 0;
  transform: translateY(40px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

/* HIGHLIGHT */
.highlight {
  border: 2px solid #19c37d;
}

/* TEXT */
.text {
  font-size: 14px;
  line-height: 1.7;
  color: #1e293b;
}

/* TAGS */
.tags {
  margin-top: 10px;
}

.tags span {
  font-size: 11px;
  background: #eafff3;
  color: #19c37d;
  padding: 4px 8px;
  border-radius: 8px;
  margin-right: 5px;
  display: inline-block;
}

/* BOTTOM */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

.info h3 {
  font-size: 15px;
  color: #0f172a;
}

.info span {
  font-size: 12px;
  color: #64748b;
}

/* AVATAR */
.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: linear-gradient(135deg, #19c37d, #0ea765);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

/* Back Button */
.back-btn {
  text-align: center;
  margin-top: 40px;
  padding-bottom: 20px;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #19c37d, #0ea765);
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}

.btn-back:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(25, 195, 125, 0.3);
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    padding-top: 0;
  }

  .lang-switcher-fixed {
    top: 10px;
    right: 10px;

// Function to render testimonial cards
function renderTestimonials(lang) {
  const grid = document.getElementById('testimonialsGrid');
  const data = testimonialsData[lang];

  if (!grid) return;

  grid.innerHTML = '';

  data.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = `card ${item.highlight ? 'highlight' : ''}`;
    card.setAttribute('data-index', index);

    card.innerHTML = `
      <p class="text">${item.text}</p>
      <div class="tags">
        ${item.tags.map(tag => `<span>${tag}</span>`).join('')}
      </div>
      <div class="bottom">
        <div class="info">
          <h3>${item.name}</h3>
          <span>${item.branch}</span>
        </div>
        <div class="avatar">${item.avatar}</div>
      </div>
    `;

    grid.appendChild(card);
  });

  // Re-attach scroll animation
  const cards = document.querySelectorAll(".card");

  function reveal() {
    const trigger = window.innerHeight - 80;
    cards.forEach(c => {
      if (c.getBoundingClientRect().top < trigger) {
        c.classList.add("show");
      }
    });
  }

  window.removeEventListener("scroll", reveal);
  window.addEventListener("scroll", reveal);
  reveal();
}

// Apply language
function applyLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('selectedLanguage', lang);

  const t = translations[lang];

  document.getElementById('pageTitle').innerText = t.pageTitle;
  document.getElementById('pageSub').innerText = t.pageSub;
  document.getElementById('backBtn').innerText = t.backBtn;

  // Render testimonials in selected language
  renderTestimonials(lang);

  // Update button styles
  const btnTa = document.getElementById('btnTa');
  const btnEn = document.getElementById('btnEn');
  if (btnTa) btnTa.style.opacity = lang === 'ta' ? '1' : '0.6';
  if (btnEn) btnEn.style.opacity = lang === 'en' ? '1' : '0.6';
}

// Switch language
function switchLanguage(lang) {
  applyLanguage(lang);
}

// Go back to home page
function goBack() {
  window.location.href = '/';
}

// Load saved language on page load
document.addEventListener('DOMContentLoaded', function() {
  const savedLang = localStorage.getItem('selectedLanguage');
  if (savedLang === 'ta') {
    applyLanguage('ta');
  } else {
    applyLanguage('en');
  }
});
