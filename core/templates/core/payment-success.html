<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Payment Successful | Prince Group</title>
  <style>
    /* ========== RESET & VARIABLES ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-deep: #064e3b;
      --green-primary: #10b981;
      --green-dark: #059669;
      --green-glow: rgba(16, 185, 129, 0.4);
      --white-glass: rgba(255, 255, 255, 0.94);
      --text-dark: #064e3b;
      --text-light: #475569;
      --shadow-premium: 0 20px 35px -10px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(16, 185, 129, 0.2);
      --radius-card: 1.8rem;
    }

    /* full viewport – prevent any overflow */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 20% 40%, rgba(200, 250, 220, 0.4), rgba(235, 255, 240, 0.9)),
                  repeating-linear-gradient(45deg, rgba(25, 195, 125, 0.02) 0px, rgba(25, 195, 125, 0.02) 1px, transparent 1px, transparent 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ========== ENHANCED BACKGROUND MOTION (GREEN THEME) ========== */
    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: -1;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.4), rgba(6, 78, 59, 0.1));
      top: -20%;
      left: -20%;
      border-radius: 50%;
      filter: blur(80px);
      animation: floatGlow 14s infinite alternate ease-in-out;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.35), rgba(5, 150, 105, 0.08));
      bottom: -20%;
      right: -20%;
      border-radius: 50%;
      filter: blur(90px);
      animation: floatGlow 18s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      100% { transform: translate(4%, 6%) scale(1.15); opacity: 0.9; }
    }

    /* ========== LANGUAGE SWITCHER (PREMIUM GLASS) ========== */
    .lang-switcher-fixed {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 6px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(20px);
      padding: 5px 12px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    }

    .lang-btn-custom {
      background: none;
      border: none;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
      transition: all 0.2s ease;
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    .lang-sep {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ========== PAGE WRAPPER – EXACT CENTERING ========== */
    .page-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* ========== PREMIUM CARD – COMPACT & FITS ONE SCREEN ========== */
    .success-card {
      width: 100%;
      max-width: 500px;
      background: var(--white-glass);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-card);
      padding: 18px 16px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow-premium);
      text-align: center;
      animation: cardRise 0.5s ease;
      /* ensure no scroll – content height will be < viewport */
      max-height: 94vh;
      overflow-y: auto;
    }

    /* hide scrollbar for clean look (no scroll anyway) */
    .success-card::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }

    @keyframes cardRise {
      0% { opacity: 0; transform: translateY(15px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ========== ICON ========== */
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 34px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      80% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .top-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.18);
      backdrop-filter: blur(4px);
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--green-dark);
      border: 0.5px solid rgba(16, 185, 129, 0.4);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(125deg, #064e3b, #059669);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }

    .subtext {
      color: var(--text-light);
      font-size: 0.72rem;
      line-height: 1.35;
      margin-bottom: 18px;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    /* ========== SUMMARY GRID (COMPACT) ========== */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-box {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 18px;
      padding: 8px 6px;
      transition: all 0.2s ease;
    }

    .summary-box span {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--green-dark);
    }

    .summary-box strong {
      display: block;
      margin-top: 4px;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--text-dark);
    }

    .summary-box.full {
      grid-column: 1 / -1;
      background: linear-gradient(105deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.02));
      border-color: rgba(16, 185, 129, 0.4);
    }

    /* ========== BUTTON ========== */
    .btn-row {
      margin-top: 14px;
    }

    .btn {
      width: 100%;
      max-width: 220px;
      height: 44px;
      border: none;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(95deg, var(--green-primary), var(--green-dark));
      color: white;
      transition: all 0.25s ease;
      box-shadow: 0 8px 18px -6px rgba(16, 185, 129, 0.45);
      letter-spacing: 0.3px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .bottom-note {
      margin-top: 12px;
      font-size: 0.6rem;
      color: var(--text-light);
      background: rgba(16, 185, 129, 0.08);
      display: inline-block;
      padding: 3px 12px;
      border-radius: 30px;
    }

    /* ========== MOBILE PERFECT FIT – NO SCROLL ========== */
    @media (max-width: 640px) {
      .page-wrap {
        padding: 10px;
      }
      .success-card {
        padding: 16px 14px;
        max-width: 480px;
      }
      .success-icon {
        width: 58px;
        height: 58px;
        font-size: 30px;
        margin-bottom: 8px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .subtext {
        font-size: 0.7rem;
        margin-bottom: 16px;
      }
      .summary-box {
        padding: 7px 5px;
      }
      .summary-box strong {
        font-size: 0.75rem;
      }
      .btn {
        height: 42px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .success-card {
        padding: 14px 12px;
        border-radius: 28px;
      }
      .success-icon {
        width: 54px;
        height: 54px;
        font-size: 28px;
      }
      .top-badge {
        font-size: 9px;
        padding: 3px 12px;
      }
      h1 {
        font-size: 1.4rem;
      }
      .subtext {
        font-size: 0.65rem;
        margin-bottom: 14px;
      }
      .summary-grid {
        gap: 8px;
        margin-bottom: 12px;
      }
      .summary-box {
        padding: 6px 4px;
        border-radius: 14px;
      }
      .summary-box span {
        font-size: 8px;
      }
      .summary-box strong {
        font-size: 0.7rem;
      }
      .btn {
        height: 40px;
        font-size: 0.7rem;
        max-width: 200px;
      }
      .bottom-note {
        font-size: 0.55rem;
      }
    }

    @media (max-width: 380px) {
      .success-card {
        padding: 12px 10px;
      }
      h1 {
        font-size: 1.3rem;
      }
      .summary-box strong {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>

<!-- PREMIUM GREEN GLOW BACKGROUND -->
<div class="bg-glow"></div>

<!-- LANGUAGE SWITCHER -->
<div class="lang-switcher-fixed">
  <button class="lang-btn-custom" onclick="switchLanguage('ta')" id="btnTa">தமிழ்</button>
  <span class="lang-sep">|</span>
  <button class="lang-btn-custom" onclick="switchLanguage('en')" id="btnEn">English</button>
</div>

<div class="page-wrap">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <span class="top-badge" id="successBadge">Payment Successful</span>
    <h1 id="successTitle">Subscription Activated</h1>
    <p class="subtext" id="successSubtext">
      Your payment was completed successfully. Your selected subscription plan is now active.
    </p>

    <div class="summary-grid">
      <div class="summary-box">
        <span id="usernameLabel">Username</span>
        <strong id="userName">-</strong>
      </div>
      <div class="summary-box">
        <span id="planLabel">Selected Plan</span>
        <strong id="userPlan">-</strong>
      </div>
      <div class="summary-box">
        <span id="amountLabel">Amount Paid</span>
        <strong id="userAmount">-</strong>
      </div>
      <div class="summary-box">
        <span id="methodLabel">Payment Method</span>
        <strong id="paymentMethod">-</strong>
      </div>
    </div>

    <div class="summary-box full">
      <span id="memberIdLabel">Member ID</span>
      <strong id="memberId"></strong>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="goToDashboard()" id="dashboardBtn">Go to Dashboard</button>
    </div>

    <div class="bottom-note" id="bottomNote">
      Your subscription details have been saved successfully.
    </div>
  </div>
</div>

<script>
// ============================================
// LANGUAGE TRANSLATIONS FOR PAYMENT SUCCESS PAGE
// ============================================
let currentLang = 'en';

const translations = {
  'en': {
    successBadge: 'Payment Successful',
    successTitle: 'Subscription Activated',
    successSubtext: 'Your payment was completed successfully. Your selected subscription plan is now active.',
    usernameLabel: 'Username',
    planLabel: 'Selected Plan',
    amountLabel: 'Amount Paid',
    methodLabel: 'Payment Method',
    memberIdLabel: 'Member ID',
    dashboardBtn: 'Go to Dashboard',
    bottomNote: 'Your subscription details have been saved successfully.'
  },
  'ta': {
    successBadge: 'கட்டணம் வெற்றிகரமாக',
    successTitle: 'சந்தா செயல்படுத்தப்பட்டது',
    successSubtext: 'உங்கள் கட்டணம் வெற்றிகரமாக முடிக்கப்பட்டது. உங்கள் தேர்ந்தெடுக்கப்பட்ட சந்தா திட்டம் இப்போது செயலில் உள்ளது.',
    usernameLabel: 'பயனர்பெயர்',
    planLabel: 'தேர்ந்தெடுக்கப்பட்ட திட்டம்',
    amountLabel: 'செலுத்தப்பட்ட தொகை',
    methodLabel: 'கட்டண முறை',
    memberIdLabel: 'உறுப்பினர் ஐடி',
    dashboardBtn: 'டாஷ்போர்டுக்கு செல்லுங்கள்',
    bottomNote: 'உங்கள் சந்தா விவரங்கள் வெற்றிகரமாக சேமிக்கப்பட்டுள்ளன.'
  }
};

// Apply language
function applyLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('selectedLanguage', lang);

  const t = translations[lang];

  document.getElementById('successBadge').innerText = t.successBadge;
  document.getElementById('successTitle').innerText = t.successTitle;
  document.getElementById('successSubtext').innerText = t.successSubtext;
  document.getElementById('usernameLabel').innerText = t.usernameLabel;
  document.getElementById('planLabel').innerText = t.planLabel;
  document.getElementById('amountLabel').innerText = t.amountLabel;
  document.getElementById('methodLabel').innerText = t.methodLabel;
  document.getElementById('memberIdLabel').innerText = t.memberIdLabel;
  document.getElementById('dashboardBtn').innerText = t.dashboardBtn;
  document.getElementById('bottomNote').innerText = t.bottomNote;

  const btnTa = document.getElementById('btnTa');
  const btnEn = document.getElementById('btnEn');
  if (btnTa) btnTa.style.opacity = lang === 'ta' ? '1' : '0.6';
  if (btnEn) btnEn.style.opacity = lang === 'en' ? '1' : '0.6';
}

function switchLanguage(lang) {
  applyLanguage(lang);
}

// ==========================
// LOAD DATA FROM LOCALSTORAGE
// ==========================
const username = localStorage.getItem("username") || "-";
const plan = localStorage.getItem("selectedPlan") || "-";
const daily = parseInt(localStorage.getItem("planAmount")) || 0;
const monthly = daily * 30;
const method = localStorage.getItem("paymentMethod") || "-";
const memberId = localStorage.getItem("memberID") || "-";

document.getElementById("userName").textContent = username;
document.getElementById("userPlan").textContent = plan;
document.getElementById("userAmount").textContent = `₹${monthly} / month`;
document.getElementById("paymentMethod").textContent = method;
document.getElementById("memberId").textContent = memberId;

function goToDashboard(){
  window.location.href = "/customer_dashboard/";
}

document.addEventListener('DOMContentLoaded', function() {
  const savedLang = localStorage.getItem('selectedLanguage');
  if (savedLang === 'ta') applyLanguage('ta');
  else applyLanguage('en');
});
</script>
</body>
</html>
