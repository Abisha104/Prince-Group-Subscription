<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Payment Successful | Prince Group</title>
  <style>
html {
  scroll-behavior: smooth;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root {
  --green:#16a34a;
  --green-dark:#15803d;
  --green-soft:#dcfce7;

  --bg:#f0fdf4;
  --card:#ffffff;
  --text:#052e16;
  --muted:#64748b;
  --border:#e5e7eb;

  --shadow-sm: 0 10px 25px rgba(0,0,0,0.05);
  --shadow-md: 0 20px 40px rgba(0,0,0,0.08);

  --radius-xl: 28px;
  --radius-lg: 18px;
}

/* BODY */
body{
  font-family: Inter, "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg,#ecfdf5,#d1fae5);
  min-height:100vh;
  color:var(--text);
  position:relative;
}

/* Language Switcher - FIXED STICKY TOP */
.lang-switcher-fixed{
  position:fixed;
  top:16px;
  right:16px;
  z-index:9999;
  display:flex;
  gap:10px;
  background:rgba(0,0,0,0.75);
  padding:8px 16px;
  border-radius:50px;
  backdrop-filter:blur(14px);
  border:1px solid rgba(34,197,94,0.4);
  box-shadow:0 6px 18px rgba(0,0,0,0.3);
}

.lang-btn-custom{
  background:none;
  border:none;
  color:#22c55e;
  font-weight:600;
  cursor:pointer;
  padding:5px 12px;
  border-radius:30px;
  transition:all 0.2s;
  font-family:'Poppins',sans-serif;
  font-size:14px;
}

.lang-btn-custom:hover{
  background:rgba(34,197,94,0.25);
  transform:scale(1.02);
}

.lang-sep{
  color:#ffffffaa;
}

/* WRAP */
.page-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* CARD */
.success-card{
  width:100%;
  max-width:620px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:36px 30px;
  box-shadow:var(--shadow-md);
  text-align:center;
  animation:fadeUp .6s ease;
}

/* SUCCESS ICON */
.success-icon{
  width:84px;
  height:84px;
  margin:0 auto 18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--green-soft);
  color:var(--green-dark);
  font-size:34px;
  font-weight:800;
  animation:pop .4s ease;
}

/* BADGE */
.top-badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:var(--green-soft);
  color:var(--green-dark);
  font-size:12px;
  font-weight:700;
  margin-bottom:16px;
}

/* TITLE */
h1{
  font-size:2rem;
  margin-bottom:10px;
}

/* TEXT */
.subtext{
  color:var(--muted);
  font-size:14px;
  line-height:1.8;
  margin-bottom:28px;
}

/* SUMMARY */
.summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}

.summary-box{
  background:#f9fafb;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px;
  box-shadow:var(--shadow-sm);
  transition:.25s;
}

.summary-box:hover{
  transform:translateY(-3px);
}

.summary-box span{
  font-size:12px;
  color:var(--muted);
}

.summary-box strong{
  display:block;
  margin-top:6px;
  font-size:16px;
  font-weight:700;
}

/* MEMBER ID FULL WIDTH */
.summary-box.full{
  grid-column:1 / -1;
}

/* BUTTON */
.btn-row{
  margin-top:16px;
}

.btn{
  min-width:220px;
  height:52px;
  border:none;
  border-radius:999px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff;
  transition:.3s;
  box-shadow:0 12px 25px rgba(22,163,74,0.25);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 30px rgba(22,163,74,0.35);
}

.btn:focus{
  outline:2px solid var(--green);
  outline-offset:2px;
}

/* NOTE */
.bottom-note{
  margin-top:16px;
  font-size:12px;
  color:var(--muted);
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes pop{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  body {
    padding-top: 0;
  }
  .lang-switcher-fixed {
    top: 10px;
    right: 10px;
    padding: 6px 12px;
    gap: 6px;
  }
  .lang-btn-custom {
    font-size: 11px;
    padding: 3px 8px;
  }
  .page-wrap {
    padding: 70px 20px 20px 20px;
  }
  .success-card {
    padding: 28px 24px;
  }
  .success-icon {
    width: 76px;
    height: 76px;
    font-size: 30px;
  }
  h1 {
    font-size: 1.8rem;
  }
  .subtext {
    font-size: 13px;
  }
  .summary-box {
    padding: 14px;
  }
  .btn {
    height: 50px;
    font-size: 14px;
  }
}

@media(max-width:640px){
  .page-wrap {
    padding: 65px 16px 16px 16px;
  }
  .success-card{
    padding: 20px;
    border-radius: var(--radius-xl);
  }
  .summary-grid{
    grid-template-columns:1fr;
  }
  .btn{
    width:100%;
  }
}

@media(max-width:480px){
  .lang-switcher-fixed {
    top: 8px;
    right: 8px;
    padding: 5px 10px;
    gap: 4px;
  }
  .lang-btn-custom {
    font-size: 10px;
    padding: 3px 6px;
  }
  .lang-sep {
    font-size: 10px;
  }
  .page-wrap {
    padding: 60px 12px 12px 12px;
  }
  .success-card {
    padding: 16px;
  }
  .success-icon {
    width: 70px;
    height: 70px;
    font-size: 28px;
    margin-bottom: 16px;
  }
  .top-badge {
    padding: 6px 12px;
    font-size: 11px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
  }
  .subtext {
    font-size: 12px;
    margin-bottom: 24px;
  }
  .summary-grid {
    gap: 12px;
    margin-bottom: 18px;
  }
  .summary-box {
    padding: 12px;
  }
  .summary-box span {
    font-size: 11px;
  }
  .summary-box strong {
    font-size: 15px;
  }
  .btn {
    height: 48px;
    font-size: 14px;
  }
  .bottom-note {
    font-size: 11px;
    margin-top: 14px;
  }
}

@media(max-width:360px){
  .lang-switcher-fixed {
    top: 6px;
    right: 6px;
    padding: 4px 8px;
  }
  .lang-btn-custom {
    font-size: 9px;
    padding: 2px 5px;
  }
  .page-wrap {
    padding: 55px 10px 10px 10px;
  }
  .success-card {
    padding: 14px;
  }
  .success-icon {
    width: 60px;
    height: 60px;
    font-size: 24px;
  }
  h1 {
    font-size: 1.4rem;
  }
  .subtext {
    font-size: 11px;
  }
  .summary-box strong {
    font-size: 14px;
  }
  .btn {
    height: 44px;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<!-- Language Switcher - FIXED STICKY TOP -->
<div class="lang-switcher-fixed">
  <button class="lang-btn-custom" onclick="switchLanguage('ta')" id="btnTa">தமிழ்</button>
  <span class="lang-sep">|</span>
  <button class="lang-btn-custom" onclick="switchLanguage('en')" id="btnEn">English</button>
</div>

<div class="page-wrap">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <span class="top-badge" id="successBadge">Payment Successful</span>
    <h1 id="successTitle">Subscription Activated</h1>
    <p class="subtext" id="successSubtext">
      Your payment was completed successfully. Your selected subscription plan is now active.
    </p>

    <div class="summary-grid">
      <div class="summary-box">
        <span id="usernameLabel">Username</span>
        <strong id="userName">-</strong>
      </div>

      <div class="summary-box">
        <span id="planLabel">Selected Plan</span>
        <strong id="userPlan">-</strong>
      </div>

      <div class="summary-box">
        <span id="amountLabel">Amount Paid</span>
        <strong id="userAmount">-</strong>
      </div>

      <div class="summary-box">
        <span id="methodLabel">Payment Method</span>
        <strong id="paymentMethod">-</strong>
      </div>
    </div>

    <div class="summary-box full">
      <span id="memberIdLabel">Member ID</span>
      <strong id="memberId"></strong>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="goToDashboard()" id="dashboardBtn">Go to Dashboard</button>
    </div>

    <div class="bottom-note" id="bottomNote">
      Your subscription details have been saved successfully.
    </div>
  </div>
</div>

<script>

// ============================================
// LANGUAGE TRANSLATIONS FOR PAYMENT SUCCESS PAGE
// ============================================
let currentLang = 'en';

const translations = {
  'en': {
    successBadge: 'Payment Successful',
    successTitle: 'Subscription Activated',
    successSubtext: 'Your payment was completed successfully. Your selected subscription plan is now active.',
    usernameLabel: 'Username',
    planLabel: 'Selected Plan',
    amountLabel: 'Amount Paid',
    methodLabel: 'Payment Method',
    memberIdLabel: 'Member ID',
    dashboardBtn: 'Go to Dashboard',
    bottomNote: 'Your subscription details have been saved successfully.'
  },
  'ta': {
    successBadge: 'கட்டணம் வெற்றிகரமாக',
    successTitle: 'சந்தா செயல்படுத்தப்பட்டது',
    successSubtext: 'உங்கள் கட்டணம் வெற்றிகரமாக முடிக்கப்பட்டது. உங்கள் தேர்ந்தெடுக்கப்பட்ட சந்தா திட்டம் இப்போது செயலில் உள்ளது.',
    usernameLabel: 'பயனர்பெயர்',
    planLabel: 'தேர்ந்தெடுக்கப்பட்ட திட்டம்',
    amountLabel: 'செலுத்தப்பட்ட தொகை',
    methodLabel: 'கட்டண முறை',
    memberIdLabel: 'உறுப்பினர் ஐடி',
    dashboardBtn: 'டாஷ்போர்டுக்கு செல்லுங்கள்',
    bottomNote: 'உங்கள் சந்தா விவரங்கள் வெற்றிகரமாக சேமிக்கப்பட்டுள்ளன.'
  }
};

// Apply language
function applyLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('selectedLanguage', lang);

  const t = translations[lang];

  document.getElementById('successBadge').innerText = t.successBadge;
  document.getElementById('successTitle').innerText = t.successTitle;
  document.getElementById('successSubtext').innerText = t.successSubtext;
  document.getElementById('usernameLabel').innerText = t.usernameLabel;
  document.getElementById('planLabel').innerText = t.planLabel;
  document.getElementById('amountLabel').innerText = t.amountLabel;
  document.getElementById('methodLabel').innerText = t.methodLabel;
  document.getElementById('memberIdLabel').innerText = t.memberIdLabel;
  document.getElementById('dashboardBtn').innerText = t.dashboardBtn;
  document.getElementById('bottomNote').innerText = t.bottomNote;

  // Update button styles
  const btnTa = document.getElementById('btnTa');
  const btnEn = document.getElementById('btnEn');
  if (btnTa) btnTa.style.opacity = lang === 'ta' ? '1' : '0.6';
  if (btnEn) btnEn.style.opacity = lang === 'en' ? '1' : '0.6';
}

// Switch language
function switchLanguage(lang) {
  applyLanguage(lang);
}

// ==========================
// LOAD DATA FROM LOCALSTORAGE
// ==========================
const username = localStorage.getItem("username") || "-";
const plan = localStorage.getItem("selectedPlan") || "-";
const daily = parseInt(localStorage.getItem("planAmount")) || 0;
const monthly = daily * 30;
const method = localStorage.getItem("paymentMethod") || "-";
const memberId = localStorage.getItem("memberID") || "-";

// Update UI
document.getElementById("userName").textContent = username;
document.getElementById("userPlan").textContent = plan;
document.getElementById("userAmount").textContent = `₹${monthly} / month`;
document.getElementById("paymentMethod").textContent = method;
document.getElementById("memberId").textContent = memberId;

// ==========================
// FUNCTION TO GO TO DASHBOARD
// ==========================
function goToDashboard(){
  window.location.href = "core/dashboard.html";
}

// ==========================
// LOAD SAVED LANGUAGE ON PAGE LOAD
// ==========================
document.addEventListener('DOMContentLoaded', function() {
  const savedLang = localStorage.getItem('selectedLanguage');
  if (savedLang === 'ta') {
    applyLanguage('ta');
  } else {
    applyLanguage('en');
  }
});
</script>

</body>
</html>
